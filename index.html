<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトル</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #141414;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #dab358;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
            font-size: 2em;
            font-weight: bold;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        /* 左上の称号バッジ */
        .badge-container {
            align-self: flex-start;
            margin-bottom: 15px;
            margin-left: 10%;
        }
        @media (max-width: 768px) { .badge-container { margin-left: 0; align-self: center; } }
        .title-badge {
            background-color: #1a1a1a;
            border: 1px solid #dab358;
            color: #fff;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .auth-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-input {
            background-color: #333;
            border: 1px solid #555;
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-size: 1em;
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .auth-btn {
            background: linear-gradient(135deg, #dab358, #b08b35);
            color: black;
            border: none;
            border-radius: 5px;
            padding: 12px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .switch-auth-lnk {
            color: #00ffcc;
            font-size: 0.85em;
            cursor: pointer;
            text-decoration: underline;
        }
        .game-main-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        
        /* 金枠コンテナ */
        .gold-box {
            background-color: #222222;
            border: 2px solid #dab358;
            padding: 30px;
            border-radius: 12px;
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .gold-box h2 {
            margin-top: 0;
            font-size: 1.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .gold-box p {
            text-align: left;
            line-height: 1.6;
            color: #ccc;
        }

        .mode-select-btns { display: flex; gap: 15px; margin-top: 25px; }
        .start-nav-btn {
            background: linear-gradient(135deg, #dab358, #b08b35);
            color: black;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .online-btn { background: linear-gradient(135deg, #00ffcc, #00b399); }

        /* CPU強度選択用（赤枠コンテナ） */
        .level-box {
            background-color: #222222;
            border: 2px solid #ff4d4d;
            padding: 30px;
            border-radius: 12px;
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
        }
        .level-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .level-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .level-btn {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 14px 20px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1em;
            transition: background 0.2s;
        }
        .level-btn:hover { background-color: #3a3a3a; border-color: #dab358; }
        .lvl-lbl { font-weight: bold; }
        .lvl-1 { color: #ff4d4d; }
        .lvl-2 { color: #ffb300; }
        .lvl-3 { color: #ffb300; }
        .lvl-4 { color: #ff4d4d; }
        .lvl-5 { color: #cc00ff; }
        .lvl-desc { font-size: 0.85em; color: #ccc; }

        /* 文豪選択コンテナ */
        .select-container {
            background-color: #222222;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 12px;
            max-width: 950px;
            width: 100%;
            text-align: center;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        
        /* 名前変更バー */
        .name-change-bar {
            background-color: #1a1a1a;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .name-change-bar span {
            color: #aaa;
            font-size: 0.95em;
        }
        .inline-name-input {
            background-color: #2a2a2a;
            border: 1px solid #555;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 1em;
            width: 200px;
        }
        .inline-save-btn {
            background-color: #dab358;
            color: black;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95em;
        }
        .inline-save-btn:hover { background-color: #b08b35; }

        .select-title-text {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 25px;
            color: #fff;
        }

        .select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }
        @media (max-width: 800px) { .select-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 550px) { .select-grid { grid-template-columns: 1fr; } }
        
        .select-card-btn {
            background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .select-card-btn:hover { border-color: #dab358; transform: translateY(-2px); }
        .select-name { font-size: 1.2em; font-weight: bold; color: #dab358; margin-bottom: 4px; }
        .select-stats { font-size: 0.85em; color: #aaa; margin-bottom: 8px; }
        .select-ability { font-size: 0.8em; color: #00ffcc; line-height: 1.4; }
        
        .online-setup-box {
            background-color: #1a1a1a;
            border: 2px solid #00ffcc;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .online-input {
            background-color: #333;
            border: 1px solid #00ffcc;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 1.1em;
            text-align: center;
            width: 200px;
        }

        /* バトルフィールド設定 */
        .battle-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        .battle-field { display: flex; justify-content: space-around; width: 100%; max-width: 750px; margin-bottom: 20px; gap: 15px; }
        .card {
            background: linear-gradient(135deg, #2c2c2c, #111);
            border: 3px solid #dab358;
            border-radius: 10px;
            width: 240px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .battle-user-badge {
            font-size: 0.75em;
            background-color: #111;
            border: 1px solid #ffb300;
            padding: 3px 8px;
            border-radius: 4px;
            color: #fff;
            margin-bottom: 8px;
            width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-name { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; color: #dab358; width: 100%; }
        .stat { font-size: 1em; margin: 5px 0; font-weight: bold; }
        .hp { color: #ff4d4d; }
        .atk { color: #ffb300; }
        .ability-badge { font-size: 0.8em; color: #00ffcc; margin-top: 8px; border: 1px dashed #00ffcc; padding: 4px; border-radius: 4px; background: #111; min-height: 32px; display: flex; align-items: center; justify-content: center; width: 100%; box-sizing: border-box; }
        
        .timer-wraper { width: 100%; background-color: #333; height: 6px; border-radius: 3px; margin-bottom: 15px; display: none; overflow: hidden; max-width: 600px; }
        .timer-bar { background: linear-gradient(90deg, #ff4d4d, #cc00ff); width: 100%; height: 100%; transition: width 0.1s linear; }

        .quiz-container {
            background-color: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .hint-box {
            background-color: #222;
            border-left: 5px solid #dab358;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            font-size: 1em;
            text-align: left;
            line-height: 1.5;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        .btn:hover { background-color: #dab358; color: black; }
        .log {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1em;
            min-height: 60px;
            color: #00ffcc;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .user-info-banner {
            font-size: 0.8em;
            color: #00ffcc;
            margin-bottom: 15px;
            background-color: #222;
            padding: 5px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>国語便覧 文豪バトル</h1>
    <p class="subtitle">正しい文豪を選び、特殊能力で勝利を掴め！</p>

    <div class="badge-container">
        <span class="title-badge" id="current-title-badge">🎖️ 称号なし / 文豪ゲスト</span>
    </div>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">🔐 ログイン</h2>
        <p id="auth-msg" style="font-size:0.85em; color:#ff4d4d; margin-bottom:10px;"></p>
        <input type="email" id="auth-email" class="auth-input" placeholder="メールアドレス">
        <input type="password" id="auth-password" class="auth-input" placeholder="パスワード">
        <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">ログインする</button>
        <p><span id="auth-switch-text" class="switch-auth-lnk" onclick="toggleAuthMode()">新しくアカウントを作る（新規登録）</span></p>
    </div>

    <div id="game-main-content" class="game-main-content">
        <div class="user-info-banner" id="login-user-badge">ログイン中</div>

        <div id="rules-screen" class="gold-box">
            <h2>📜 对戦ルール説明</h2>
            <p>出題される作品や解説を読み、正しい文豪の名前を4択から選んでください。</p>
            <p>文豪ごとに超強力な特殊パッシブスキルが自動で発動します！</p>
            
            <div class="mode-select-btns">
                <button class="start-nav-btn" onclick="goToCpuLevelSelect()">👤 一人で遊ぶ</button>
                <button class="start-nav-btn online-btn" onclick="goToSelectScreen(true)">🌐 オンライン対戦</button>
            </div>
        </div>

        <div id="cpu-level-screen" class="level-box">
            <div class="level-title">🤖 CPUの強さを選択</div>
            <div class="level-grid">
                <button class="level-btn" onclick="selectCpuLevel(1)">
                    <span class="lvl-lbl lvl-1">レベル 1</span>
                    <span class="lvl-desc">HP: 250 / ATK: 30 / 間隔: 7.0秒</span>
                </button>
                <button class="level-btn" onclick="selectCpuLevel(2)">
                    <span class="lvl-lbl lvl-2">レベル 2</span>
                    <span class="lvl-desc">HP: 400 / ATK: 45 / 間隔: 5.5秒</span>
                </button>
                <button class="level-btn" onclick="selectCpuLevel(3)">
                    <span class="lvl-lbl lvl-3">レベル 3</span>
                    <span class="lvl-desc">HP: 600 / ATK: 60 / 間隔: 5.0秒</span>
                </button>
                <button class="level-btn" onclick="selectCpuLevel(4)">
                    <span class="lvl-lbl lvl-4">レベル 4</span>
                    <span class="lvl-desc">HP: 800 / ATK: 75 / 間隔: 4.0秒</span>
                </button>
                <button class="level-btn" onclick="selectCpuLevel(5)">
                    <span class="lvl-lbl lvl-5">レベル 5 (極限)</span>
                    <span class="lvl-desc">HP: 1000 / ATK: 90 / 間隔: 2.5秒</span>
                </button>
            </div>
        </div>

        <div id="character-select" class="select-container">
            <div class="name-change-bar">
                <span>名前変更:</span>
                <input type="text" id="player-name-input" class="inline-name-input" value="文豪ゲスト">
                <button class="inline-save-btn" onclick="savePlayerName()">保存</button>
            </div>

            <div class="select-title-text">出陣する文豪を選択（厳選22名）</div>
            <div class="select-grid" id="select-grid-container"></div>
            
            <div id="online-setup" class="online-setup-box" style="display: none;">
                <h3>🔑 オンライン部屋設定</h3>
                <input type="number" id="room-input" class="online-input" placeholder="4桁の部屋番号">
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <button class="btn" onclick="startOnlineGame('host')">部屋を作る (先に入る)</button>
                    <button class="btn" style="background-color:#00ffcc; color:black;" onclick="startOnlineGame('guest')">部屋に入る (後から入る)</button>
                </div>
            </div>
        </div>

        <div id="battle-screen" class="battle-container">
            <div class="battle-field">
                <div class="card">
                    <div class="battle-user-badge" id="p-battle-badge">🎖️ -</div>
                    <div class="card-name" id="p-name">-</div>
                    <div class="stat hp" id="p-hp-display">HP: ---</div>
                    <div class="stat" id="p-shield-display" style="display:none; color:#00ffcc;">シールド: 0</div>
                    <div class="stat atk" id="p-atk-display">ATK: --</div>
                    <div class="ability-badge" id="p-ability-name">-</div>
                </div>
                <div style="font-size: 2em; align-self: center; color: #dab358;">VS</div>
                <div class="card">
                    <div class="battle-user-badge" id="e-battle-badge">🎖️ 待機中</div>
                    <div class="card-name" id="e-name">待機中...</div>
                    <div class="stat hp" id="e-hp-display">HP: ---</div>
                    <div class="stat" id="e-shield-display" style="display:none; color:#00ffcc;">シールド: 0</div>
                    <div class="stat atk" id="e-atk-display">ATK: --</div>
                    <div class="ability-badge" id="e-ability-name">-</div>
                </div>
            </div>
            
            <div class="timer-wraper" id="cpu-timer-wrapper">
                <div class="timer-bar" id="cpu-timer-bar"></div>
            </div>

            <div class="quiz-container">
                <div class="hint-box" id="hint-text"></div>
                <div class="options" id="options-container"></div>
                <div class="log" id="log-text"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eqqbxsiptbgxgsznuzhq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_yP1Xswfbs9_K0-1CoSimPw_p1TXzzxd";
        let currentAuthMode = "login"; 
        let loginUserToken = "";

        let currentTitle = "称号なし";
        let currentName = "文豪ゲスト";
        let earnedTitles = { 1: false, 2: false, 3: false, 4: false, 5: false, 6: false };

        // 称号の色を定義するオブジェクト
        const titleColors = {
            "称号なし": "#fff",
            "1.文学好き": "#fff",
            "2.文学の探求者": "#fff",
            "3.新進気鋭の作家": "#fff",
            "4.文壇の巨匠": "#ffb300", // オレンジ
            "5.文豪神": "#ff4d4d",      // 赤
            "6.便覧神": "#cc00ff"       // 紫
        };

        const cpuLevels = {
            1: { hp: 250, atk: 30, interval: 7.0, title: "1.文学好き" },
            2: { hp: 400, atk: 45, interval: 5.5, title: "2.文学の探求者" },
            3: { hp: 600, atk: 60, interval: 5.0, title: "3.新進気鋭の作家" },
            4: { hp: 800, atk: 75, interval: 4.0, title: "4.文壇の巨匠" },
            5: { hp: 1000, atk: 90, interval: 2.5, title: "5.文豪神" },
            6: { hp: 1300, atk: 110, interval: 1.5, title: "6.便覧神" }
        };
        
        let selectedCpuLevelNum = 1;
        let isOnlineMode = false;
        let myRole = ""; 
        let targetRoomNo = "";
        let syncIntervalTimer = null;

        let cpuAttackTimer = null;
        let cpuBarTimer = null;
        let currentTimerMax = 7000;
        let currentTimerLeft = 7000;

        let pBungo = null; 
        let eBungo = null; 
        let currentQuizIndex = 0;
        let continuousCorrectAnswers = 0; 
        let isDead = false;
        let inCountdown = false; // カウントダウン中フラグ

        function refreshTitleBadge() {
            const badge = document.getElementById('current-title-badge');
            badge.innerText = `🎖️ ${currentTitle} / ${currentName}`;
            // 称号名に応じた色を反映
            badge.style.color = titleColors[currentTitle] || "#fff";
        }

        function savePlayerName() {
            const inputVal = document.getElementById('player-name-input').value.trim();
            if(!inputVal) { alert("名前を入力してください"); return; }
            currentName = inputVal;
            refreshTitleBadge();
            alert("名前を保存しました！");
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const msgElm = document.getElementById('auth-msg');
            if(!email || !password) { msgElm.innerText = "入力してください"; return; }
            msgElm.innerText = "通信中...";

            let url = `${SUPABASE_URL}/auth/v1/token?grant_type=password`; 
            if(currentAuthMode === "signup") url = `${SUPABASE_URL}/auth/v1/signup`; 

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(!res.ok) { msgElm.innerText = "認証に失敗しました"; return; }

                if(currentAuthMode === "signup") {
                    msgElm.innerText = "アカウント作成成功！ログインしてください。"; toggleAuthMode();
                } else {
                    loginUserToken = data.access_token;
                    document.getElementById('auth-screen').style.display = "none";
                    document.getElementById('game-main-content').style.display = "flex";
                    document.getElementById('login-user-badge').innerText = `👤 ログイン中: ${data.user.email}`;
                    refreshTitleBadge();
                }
            } catch(e) { msgElm.innerText = "通信エラーが発生しました"; }
        }

        function toggleAuthMode() {
            currentAuthMode = (currentAuthMode === "login") ? "signup" : "login";
            document.getElementById('auth-title').innerText = currentAuthMode === "login" ? "🔐 ログイン" : "📝 新規登録";
        }

        async function supabaseFetch(endpoint, options = {}) {
            const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" };
            return fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { ...options, headers: { ...headers, ...options.headers } });
        }

        function goToCpuLevelSelect() {
            document.getElementById('rules-screen').style.display = "none";
            document.getElementById('cpu-level-screen').style.display = "block";
        }

        function selectCpuLevel(levelNum) {
            selectedCpuLevelNum = levelNum;
            document.getElementById('cpu-level-screen').style.display = "none";
            goToSelectScreen(false);
        }

        function goToSelectScreen(onlineFlag) {
            isOnlineMode = onlineFlag;
            document.getElementById('rules-screen').style.display = "none";
            document.getElementById('character-select').style.display = "block";
            
            document.getElementById('online-setup').style.display = onlineFlag ? "block" : "none";
            document.getElementById('player-name-input').value = currentName;

            const grid = document.getElementById('select-grid-container');
            grid.innerHTML = "";
            bungoData.forEach((b, idx) => {
                const btn = document.createElement('button');
                btn.className = "select-card-btn";
                btn.onclick = () => selectMyBungo(idx);
                btn.innerHTML = `
                    <div class="select-name">${b.name}</div>
                    <div class="select-stats">HP: ${b.hp} / ATK: ${b.atk}</div>
                    <div class="select-ability">${b.desc}</div>
                `;
                grid.appendChild(btn);
            });
        }

        function selectMyBungo(idx) {
            pBungo = JSON.parse(JSON.stringify(bungoData[idx]));
            pBungo.shield = 0;
            
            if(pBungo.name === "重松清") pBungo.shield = 40;

            if(!isOnlineMode) {
                startCpuBattle();
            } else {
                alert(`${pBungo.name} を選択しました。下の「オンライン部屋設定」を行ってください。`);
            }
        }

        function startCpuBattle() {
            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            document.getElementById('cpu-timer-wrapper').style.display = "block";
            
            const cfg = cpuLevels[selectedCpuLevelNum];
            eBungo = {
                name: selectedCpuLevelNum === 6 ? `便覧神 (Lv6)` : `CPU レベル${selectedCpuLevelNum}`,
                hp: cfg.hp,
                maxHp: cfg.hp,
                atk: cfg.atk,
                shield: 0,
                abName: selectedCpuLevelNum === 6 ? "絶対絶望の猛攻" : "自動猛攻",
                isCpu: true
            };

            isDead = false;
            continuousCorrectAnswers = 0;
            
            document.getElementById('p-battle-badge').innerText = `🎖️ ${currentTitle} / ${currentName}`;
            document.getElementById('p-battle-badge').style.color = titleColors[currentTitle] || "#fff";
            document.getElementById('e-battle-badge').innerText = `🤖 CPU専用`;

            updateUiDisplays();

            // レベル6の場合のみ5秒のカウントダウンを挟む
            if (selectedCpuLevelNum === 6) {
                runLevel6Countdown(cfg.interval * 1000);
            } else {
                inCountdown = false;
                currentQuizIndex = Math.floor(Math.random() * quizData.length);
                showQuiz();
                startCpuTimer(cfg.interval * 1000);
            }
        }

        // レベル6開始前の5秒カウントダウン処理
        function runLevel6Countdown(nextIntervalMs) {
            inCountdown = true;
            clearInterval(cpuAttackTimer);
            clearInterval(cpuBarTimer);
            
            document.getElementById('hint-text').innerText = "⚠️ 警告：間もなく究極の試練が始まります……";
            document.getElementById('options-container').innerHTML = ""; // クイズボタンを隠す
            
            let count = 5;
            logAction(`⚠️ 便覧神の降臨まで あと ${count} 秒...`);

            const counter = setInterval(() => {
                count--;
                if (count > 0) {
                    logAction(`⚠️ 便覧神の降臨まで あと ${count} 秒...`);
                } else {
                    clearInterval(counter);
                    inCountdown = false;
                    logAction("🔥 便覧神 バトル開幕！！！ 🔥");
                    // クイズ開始とタイマー始動
                    currentQuizIndex = Math.floor(Math.random() * quizData.length);
                    showQuiz();
                    startCpuTimer(nextIntervalMs);
                }
            }, 1000);
        }

        function startCpuTimer(durationMs) {
            if (inCountdown) return; // カウントダウン中はタイマーを作動させない
            clearInterval(cpuAttackTimer);
            clearInterval(cpuBarTimer);
            currentTimerMax = durationMs;
            currentTimerLeft = durationMs;

            cpuBarTimer = setInterval(() => {
                currentTimerLeft -= 100;
                if(currentTimerLeft <= 0) currentTimerLeft = 0;
                const pct = (currentTimerLeft / currentTimerMax) * 100;
                document.getElementById('cpu-timer-bar').style.width = `${pct}%`;
            }, 100);

            cpuAttackTimer = setInterval(() => {
                if(isDead || inCountdown) return;
                let dmg = eBungo.atk;
                
                if(pBungo.name === "森鴎外" && Math.random() < 0.20) {
                    logAction("🎨 森鴎外の『舞姫』！敵の攻撃を華麗に回避した！");
                    resetCpuInterval(); return;
                }
                if(pBungo.name === "幸田文" && Math.random() < 0.15) {
                    logAction("🌊 幸田文の『慢りしき流れる』！攻撃を完全に無効化！");
                    resetCpuInterval(); return;
                }
                if(pBungo.name === "宮沢賢治") dmg = Math.max(0, dmg - 5);
                if(pBungo.name === "梅崎春生") dmg = Math.max(0, dmg - 2);
                if(pBungo.name === "遠藤周作") dmg = Math.round(dmg * 0.85);

                if(pBungo.shield > 0) {
                    if(pBungo.shield >= dmg) { pBungo.shield -= dmg; dmg = 0; }
                    else { dmg -= pBungo.shield; pBungo.shield = 0; }
                }

                pBungo.hp -= dmg;
                logAction(`💥 ${eBungo.name}の攻撃！ ${dmg} のダメージを受けた！`);

                if(pBungo.name === "三浦哲郎" && pBungo.hp <= 50 && !pBungo.hasHealed) {
                    pBungo.hp += 40; pBungo.hasHealed = true;
                    logAction("🐟 三浦哲郎の『忍ぶ川の情愛』発動！HPが40回復！");
                }
                if(pBungo.hp <= 0 && pBungo.name === "浅田次郎" && !pBungo.hasEndured) {
                    pBungo.hp = 1; pBungo.hasEndured = true;
                    logAction("🚂 浅田次郎の『ぽっぽやの奇跡』！HP 1で踏みとどまった！");
                }

                if(pBungo.hp <= 0) {
                    pBungo.hp = 0; isDead = true;
                    logAction("💀 敗北しました... もっと国語便覧を読み込みましょう！");
                    endGame();
                }
                updateUiDisplays();
                resetCpuInterval();
            }, durationMs);
        }

        function resetCpuInterval() {
            if(isDead || inCountdown) return;
            const cfg = cpuLevels[selectedCpuLevelNum];
            startCpuTimer(cfg.interval * 1000);
        }

        async function startOnlineGame(role) {
            const roomVal = document.getElementById('room-input').value;
            if(!roomVal || roomVal.length !== 4) { alert("4桁の部屋番号を入力してください"); return; }
            if(!pBungo) { alert("先に出陣する文豪を選んでください"); return; }
            
            myRole = role;
            targetRoomNo = roomVal;
            isDead = false;
            inCountdown = false;

            const myBadgeString = `🎖️ ${currentTitle} / ${currentName}`;

            if(role === 'host') {
                await supabaseFetch(`rooms?room_no=eq.${targetRoomNo}`, { method: "DELETE" });
                const res = await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        room_no: targetRoomNo,
                        host_name: pBungo.name, host_hp: pBungo.hp, host_max_hp: pBungo.hp, host_shield: pBungo.shield, host_atk: pBungo.atk, host_ab: pBungo.abName, host_badge: myBadgeString,
                        guest_name: "待機中", guest_hp: 999, guest_max_hp: 999, guest_shield: 0, guest_atk: 0, guest_ab: "-", guest_badge: "🎖️ 接続中..."
                    })
                });
                if(!res.ok) { alert("部屋の作成に失敗しました"); return; }
                alert("部屋を作成しました！対戦相手の入場を待っています...");
            } else {
                const res = await supabaseFetch(`rooms?room_no=eq.${targetRoomNo}`, {
                    method: "PATCH",
                    body: JSON.stringify({
                        guest_name: pBungo.name, guest_hp: pBungo.hp, guest_max_hp: pBungo.hp, guest_shield: pBungo.shield, guest_atk: pBungo.atk, guest_ab: pBungo.abName, guest_badge: myBadgeString
                    })
                });
                if(!res.ok) { alert("部屋に入場できません。番号を確かめてください"); return; }
            }

            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            document.getElementById('cpu-timer-wrapper').style.display = "none";

            document.getElementById('p-battle-badge').innerText = myBadgeString;
            // オンライン時は通常白（必要なら設定）
            document.getElementById('p-battle-badge').style.color = "#fff";
            syncIntervalTimer = setInterval(syncOnlineStatus, 500);
            
            currentQuizIndex = Math.floor(Math.random() * quizData.length);
            showQuiz();
        }

        async function syncOnlineStatus() {
            if(isDead) return;
            try {
                const res = await supabaseFetch(`rooms?room_no=eq.${targetRoomNo}`, { method: "GET" });
                const data = await res.json();
                if(!data || data.length === 0) return;
                const room = data[0];

                if(myRole === 'host') {
                    eBungo = { name: room.guest_name, hp: room.guest_hp, maxHp: room.guest_max_hp, shield: room.guest_shield, atk: room.guest_atk, abName: room.guest_ab };
                    document.getElementById('e-battle-badge').innerText = room.guest_badge || "🎖️ 称号なし / ゲスト";
                    pBungo.hp = room.host_hp;
                    pBungo.shield = room.host_shield;
                } else {
                    eBungo = { name: room.host_name, hp: room.host_hp, maxHp: room.host_max_hp, shield: room.host_shield, atk: room.host_atk, abName: room.host_ab };
                    document.getElementById('e-battle-badge').innerText = room.host_badge || "🎖️ 称号なし / ホスト";
                    pBungo.hp = room.guest_hp;
                    pBungo.shield = room.guest_shield;
                }

                updateUiDisplays();

                if(pBungo.hp <= 0) {
                    isDead = true; pBungo.hp = 0; updateUiDisplays();
                    logAction("💀 負けてしまいました！"); endGame();
                } else if(eBungo.hp <= 0) {
                    isDead = true; eBungo.hp = 0; updateUiDisplays();
                    logAction("🎉 相手を撃破！対戦勝利！"); endGame();
                }
            } catch(e) { console.error(e); }
        }

        async function sendMyStatusToOnline(newMyHp, newMyShield, newEnemyHp, newEnemyShield) {
            let bodyData = {};
            if(myRole === 'host') {
                bodyData = { host_hp: newMyHp, host_shield: newMyShield, guest_hp: newEnemyHp, guest_shield: newEnemyShield };
            } else {
                bodyData = { guest_hp: newMyHp, guest_shield: newMyShield, host_hp: newEnemyHp, host_shield: newEnemyShield };
            }
            await supabaseFetch(`rooms?room_no=eq.${targetRoomNo}`, { method: "PATCH", body: JSON.stringify(bodyData) });
        }

        function showQuiz() {
            if (inCountdown) return; // カウントダウン中は選択肢を出さない
            const q = quizData[currentQuizIndex];
            document.getElementById('hint-text').innerText = `【問題】\n${q.hint}`;
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = "";

            let choices = [q.ans];
            while(choices.length < 4) {
                const rName = allBungoNamesForDummy[Math.floor(Math.random() * allBungoNamesForDummy.length)];
                if(!choices.includes(rName)) choices.push(rName);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = c;
                b.onclick = () => checkAnswer(c);
                optsContainer.appendChild(b);
            });
        }

        async function checkAnswer(selected) {
            if(isDead || inCountdown) return;
            const q = quizData[currentQuizIndex];
            
            if(selected === q.ans) {
                continuousCorrectAnswers++;
                let currentAtk = pBungo.atk;

                if(pBungo.name === "太宰治" && pBungo.hp <= (pBungo.maxHp / 2)) currentAtk = Math.round(currentAtk * 1.3);
                if(pBungo.name === "中島敦" && continuousCorrectAnswers === 1) currentAtk = currentAtk * 2;
                if(pBungo.name === "梶井基次郎") {
                    const lostPct = (pBungo.maxHp - pBungo.hp) / pBungo.maxHp;
                    currentAtk = Math.round(currentAtk * (1.0 + (lostPct * 0.5)));
                }
                if(pBungo.name === "星新一") currentAtk = Math.floor(Math.random() * 31) + 15;
                if(pBungo.name === "野間宏" && pBungo.hp <= (pBungo.maxHp * 0.3)) currentAtk = Math.round(currentAtk * 1.4);
                if(pBungo.name === "開高健" && Math.random() < 0.15) { currentAtk *= 2; logAction("🎣 開高健の『熱き輝ける闇』！ダメージ2倍！"); }
                if(pBungo.name === "大江健三郎") { pBungo.atk += 3; logAction("📖 大江健三郎の『個人的な神話』！ATK+3。"); }

                let actualDmg = currentAtk;
                if(eBungo.shield > 0) {
                    if(eBungo.shield >= actualDmg) { eBungo.shield -= actualDmg; actualDmg = 0; }
                    else { actualDmg -= eBungo.shield; eBungo.shield = 0; }
                }
                eBungo.hp -= actualDmg;
                let logMsg = `⭕ 正解！ ${eBungo.name} に ${currentAtk} ダメージ！`;

                if(pBungo.name === "夏目漱石" && Math.random() < 0.25) {
                    pBungo.hp = Math.min(pBungo.maxHp, pBungo.hp + 30); logMsg += " 🐱 HP30回復！";
                }
                if(pBungo.name === "芥川龍之介") {
                    eBungo.hp -= 10; pBungo.hp = Math.min(pBungo.maxHp, pBungo.hp + 10); logMsg += " 🕸️ 10ドレイン！";
                }
                if(pBungo.name === "井上靖" && continuousCorrectAnswers % 3 === 0) {
                    pBungo.hp = Math.min(pBungo.maxHp, pBungo.hp + 40); logMsg += " 🧱 HP40回復！";
                }
                if(pBungo.name === "鴨長明" && continuousCorrectAnswers === 5) {
                    eBungo.atk = Math.round(eBungo.atk / 2); logMsg += " 🌊 敵のATKを半減！";
                }

                logAction(logMsg);

                if(isOnlineMode) {
                    await sendMyStatusToOnline(pBungo.hp, pBungo.shield, eBungo.hp, eBungo.shield);
                } else {
                    if(eBungo.hp <= 0) {
                        eBungo.hp = 0; isDead = true; updateUiDisplays();
                        
                        const targetTitle = cpuLevels[selectedCpuLevelNum].title;
                        if (!earnedTitles[selectedCpuLevelNum]) {
                            earnedTitles[selectedCpuLevelNum] = true;
                            currentTitle = targetTitle;
                            refreshTitleBadge();
                        }

                        // レベル5「文豪神」を倒した時のみ、裏ボス「便覧神」への挑戦確認を出す
                        if(selectedCpuLevelNum === 5) {
                            clearInterval(cpuAttackTimer); clearInterval(cpuBarTimer);
                            logAction("🎉 文豪神を撃破！真の神が目覚めようとしています…");
                            document.getElementById('options-container').innerHTML = `
                                <div style="grid-column: 1 / span 2; margin-bottom:10px; font-weight:bold; color:#ff4d4d;">
                                    ⚠️ 緊急警告：隠しボス【レベル6：便覧神】に挑戦しますか？
                                </div>
                                <button class="btn" style="background-color:#ff4d4d; color:white;" onclick="triggerLevel6Challenge(true)">はい（死闘へ）</button>
                                <button class="btn" style="background-color:#3a3a3a; color:white;" onclick="triggerLevel6Challenge(false)">いいえ（街へ戻る）</button>
                            `;
                            return;
                        } else {
                            alert(`🎉 勝利！称号【${targetTitle}】を獲得・保持しています！`);
                            endGame(); return;
                        }
                    }
                    resetCpuInterval();
                }

            } else {
                continuousCorrectAnswers = 0;
                logAction("❌ 不正解！ペナルティ反撃を受けます！");
                
                if(pBungo.name === "安部公房") {
                    logAction("📦 安部公房の『砂の壁』！誤答ペナルティを無効化した！");
                } else {
                    let pDmg = 20; 
                    if(pBungo.shield > 0) {
                        if(pBungo.shield >= pDmg) { pBungo.shield -= pDmg; pDmg = 0; }
                        else { pDmg -= pDmg; pBungo.shield = 0; }
                    }
                    pBungo.hp -= pDmg;
                    if(pBungo.hp <= 0) { pBungo.hp = 0; isDead = true; logAction("💀 HPが尽きました…"); endGame(); }
                }

                if(isOnlineMode) await sendMyStatusToOnline(pBungo.hp, pBungo.shield, eBungo.hp, eBungo.shield);
            }

            if(!isDead) {
                if(pBungo.name === "三島由紀夫") { pBungo.hp -= 7; logAction("🔥 自傷ダメージ7発生。"); }
                if(pBungo.name === "永井荷風") { eBungo.hp -= 5; pBungo.hp = Math.min(pBungo.maxHp, pBungo.hp + 5); logAction("🌂 敵から5吸収。"); }
                if(pBungo.name === "鷺沢萠") { eBungo.hp -= 10; logAction("🐎 敵に10の固定ダメージ。"); }
                
                if(pBungo.hp <= 0) { pBungo.hp = 0; isDead = true; logAction("💀 自傷等により力尽きました。"); endGame(); }
                if(isOnlineMode) await sendMyStatusToOnline(pBungo.hp, pBungo.shield, eBungo.hp, eBungo.shield);
            }

            updateUiDisplays();
            if(!isDead) {
                currentQuizIndex = Math.floor(Math.random() * quizData.length);
                showQuiz();
            }
        }

        function triggerLevel6Challenge(accept) {

                selectedCpuLevelNum = 6;
                // プレイヤーのHPとシールドを全回復させて仕切り直し

            } else {
                alert("無事に帰還しました。");
                returnToMenu();
            }
